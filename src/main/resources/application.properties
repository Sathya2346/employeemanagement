spring.application.name=employeemanagement

# ── Database configuration ─────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool – tuned for cloud free-tier databases
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=30000

# Lazy DB init – Tomcat starts and binds port BEFORE connecting to DB
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Session Management (Scalability) ---
# spring.session.store-type=jdbc
# spring.session.jdbc.initialize-schema=always

# --- Observability (Actuator) ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# --- Thymeleaf and Logging ---
spring.thymeleaf.cache=false
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.session=WARN

# --- Mail Configuration ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Kolkata Time
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
server.servlet.session.timeout=30m
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Maximum size allowed for each individual file
spring.servlet.multipart.max-file-size=50MB
# Maximum total size allowed for the entire form submission
spring.servlet.multipart.max-request-size=200MB
# PREVENT PREMATURE PARSING (Crucial for Connection Reset)
spring.servlet.multipart.resolve-lazily=true

# Increases the amount of data Tomcat is willing to "swallow" when a limit is hit
server.tomcat.max-swallow-size=200MB

# Increases the maximum size of the HTTP POST body for Tomcat
server.tomcat.max-http-form-post-size=200MB

# INCREASE TIMEOUTS (Give the server more time to receive data)
server.connection-timeout=300000
server.tomcat.connection-timeout=300000
server.tomcat.keep-alive-timeout=300000
server.tomcat.max-keep-alive-requests=100

server.port=${PORT:8080}
