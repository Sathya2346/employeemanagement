<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error || EMS</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .error-icon {
            font-size: 5rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 1rem;
        }
        p {
            color: #636e72;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-ems {
            background: #6c5ce7;
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            display: inline-block;
        }
        .btn-ems:hover {
            background: #a29bfe;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-card shadow">
        <div class="error-icon">⚠️</div>
        <h1>Something Went Wrong</h1>
        <p th:text="${error != null ? error : 'An unexpected error occurred. Please try again later.'}"></p>
        <a href="javascript:history.back()" class="btn-ems">Go Back</a>
        <div class="mt-3">
            <a href="/" class="text-decoration-none text-muted small">Return to Home</a>
        </div>
    </div>
</body>
</html>
