<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>

    <div class="login-container">
        <div class="login-card shadow">
            <!-- Left Section -->
            <div class="login-left text-center">
                <img th:src="@{images/img1.png}" alt="Team Illustration">
                <h3>Grow Your <span>Workspace</span> Experience</h3>
                <p>It is certainly important because it is only through hard work that we can achieve the goals of our
                    life. Thus, we all must work hard.</p>
            </div>

            <!-- Right Section -->
            <div class="login-right mx-auto">
                <h3 class="text-center fw-semibold mb-3">Login</h3>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="text" name="username" class="form-control"
                            placeholder="Enter User name or Email" required>
                    </div>
                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control"
                            placeholder="Enter Your Password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <a th:href="@{/forgot-password}" class="forgot-link text-decoration-none small">Forgot
                            Password?</a>
                    </div>

                    <button type="submit" class="btn btn-login w-100 mb-3">Login</button>
                    <!-- Global Error Alert -->
                    <div th:if="${param.error}"
                        class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
                        <div>
                            Invalid username or password.
                        </div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${param.logout}"
                        class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
                        <div>
                            You have been logged out.
                        </div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const toggleIcon = document.querySelector('#toggleIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'password') {
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            } else {
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            }
        });
    </script>
</body>

</html>
