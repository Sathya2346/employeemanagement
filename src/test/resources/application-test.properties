# In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:ems;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Turn off standard email sending using fake settings or blocking
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=mock@example.com
spring.mail.password=mock
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Timezone settings matching main application
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Other configurations
server.port=8086
spring.main.allow-bean-definition-overriding=true
management.health.mail.enabled=false
