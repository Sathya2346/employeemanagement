version: '3.8'

services:
  # The MySQL Database
  db:
    image: mysql:8.3.0
    container_name: ems-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ems
      MYSQL_USER: root
      MYSQL_PASSWORD: ''
    ports:
      - "3306:3306"
    volumes:
      - ems-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # The Spring Boot Application
  app:
    build: .
    container_name: ems-app
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - db
    environment:
      # Override the typical application.properties URL to point to the 'db' container
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/ems?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

volumes:
  ems-db-data:
